services:
  runlet_runner_gateway:
    build:
      context: ../../
      dockerfile: build/prod/Dockerfile
    hostname: runner_gateway
    networks:
      - runner
      - runlet_external
    command: python gateway/main.py
    env_file:
      - .env

  runlet_runner_redis:
    image: redis:8.4.0-alpine
    hostname: redis
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - runlet_runner_redis_data:/data
    networks:
      - runner

  runlet_runner_worker:
    build:  
      context: ../../
      dockerfile: build/prod/Dockerfile
    env_file:
      - .env
    command: celery -A gateway.celery_app.celery_app worker --concurrency=8 --loglevel=info --events
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runlet_code_storage:/tmp #see config.yaml!!! must to ensure directory in the worker where volume will be mounted
    depends_on:
      - runlet_runner_redis
    networks:
      - runner
      - runlet_external

volumes:
  runlet_runner_redis_data:
    name: runlet_runner_redis_data
  runlet_code_storage:
    name: runlet_code_storage

networks:
  runlet_external:
    external: true
  runner: